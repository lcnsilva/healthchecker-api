; Allows PHP scripts to use up to 256 MB of memory.
memory_limit=256M
; Allows uploaded files up to 20 MB.
upload_max_filesize=20M
; Allows total POST request bodies up to 20 MB.
post_max_size=20M
; Stops long-running web requests after 60 seconds.
max_execution_time=60
; Stops slow request input parsing after 60 seconds.
max_input_time=60
; Sets PHP's default timezone to UTC for predictable timestamps.
date.timezone=UTC

; Enables OPcache for faster PHP execution.
opcache.enable=1
; Enables OPcache for CLI commands such as artisan.
opcache.enable_cli=1
; Checks source files for changes on each request in local development.
opcache.validate_timestamps=1
; Revalidates changed PHP files immediately in local development.
opcache.revalidate_freq=0
