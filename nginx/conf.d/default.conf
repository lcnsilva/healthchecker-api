# Defines one virtual server for the local API.
server {
    # Listens for HTTP traffic inside the container on port 80.
    listen 80;
    # Accepts requests for any hostname.
    server_name _;
    # Serves Laravel from the public directory, never from the project root.
    root /var/www/html/public;
    # Looks for index.php first, then index.html.
    index index.php index.html;

    # Prevents the site from being embedded in frames except from itself.
    add_header X-Frame-Options "SAMEORIGIN";
    # Prevents browsers from MIME-sniffing responses.
    add_header X-Content-Type-Options "nosniff";

    # Allows request bodies up to 20 MB.
    client_max_body_size 20m;

    # Handles normal Laravel routes.
    location / {
        # Serves existing files/directories or falls back to Laravel's front controller.
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Handles PHP script execution through PHP-FPM.
    location ~ \.php$ {
        # Sends PHP requests to the app container on PHP-FPM port 9000.
        fastcgi_pass app:9000;
        # Uses index.php as the default PHP script.
        fastcgi_index index.php;
        # Tells PHP-FPM the absolute script path to execute.
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        # Loads the standard FastCGI parameters provided by Nginx.
        include fastcgi_params;
    }

    # Blocks access to hidden dotfiles such as .env.
    location ~ /\.(?!well-known).* {
        # Denies all matching requests.
        deny all;
    }
}
